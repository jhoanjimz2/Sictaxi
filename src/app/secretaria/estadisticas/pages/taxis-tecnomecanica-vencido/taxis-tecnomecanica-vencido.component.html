<div class="contenedor">
  <div class="row">
      <div class="col-6">
          <label class="titulo">Taxis con Tecnomecanica Vencida</label>
      </div>
      <div class="col-6 flex-end">
          <app-export-excel (export)="exportar()"/>
          <app-filtro (select)="pagina({pagina: 1})"></app-filtro>
      </div>
  </div>
  <div class="row mt-20 pb-80">
      <div class="col">
          <table class="table">
              <thead>
                  <tr>
                      <th class="ptlr">Rázon social</th>
                      <th>Placa</th>
                      <th>Modelo</th>
                      <th>Marca</th>
                      <th>Número Tecnomecanica</th>
                      <th class="ptrr">Fecha de vencimiento</th>
                  </tr>
              </thead>
              <div class="h-10"></div>
              <tbody class="bw">
                <tr *ngFor="let taxi of taxis">
                  <td>{{taxi.ultima_vinculacion.empresa.razonSocial}}</td>
                  <td>{{taxi.placa}}</td>
                  <td>{{taxi.modelo}}</td>
                  <td>{{taxi.marca.marca}}</td>
                  <td>{{taxi.numeroTecnoMecanica}}</td>
                  <td>{{taxi.fechaNumeroTecnoMecanica | date: 'dd/MM/YYYY'}}</td>
                </tr>
              </tbody>
            </table>
      </div>
  </div>
  <div class="footer-paginacion ">
      <app-paginacion
          *ngIf="totalPages"
          [cantidad]="totalPages"
          [focus]="paginaActual"
          (paginar)="pagina($event)">
      </app-paginacion>
  </div>
</div>
