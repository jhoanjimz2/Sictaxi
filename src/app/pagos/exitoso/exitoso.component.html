<div class="min-h-screen flex flex-col items-center justify-center bg-gray-100 px-6">
  <!-- Tarjeta de éxito -->
  <div class="bg-white shadow-xl rounded-lg p-8 max-w-lg text-center border border-gray-200">

    <!-- Icono de éxito -->
    <div class="flex justify-center mb-4">
      <div class="bg-green-100 p-4 rounded-full">
        <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
    </div>

    <h1 class="text-3xl font-bold text-gray-800">¡Pago Exitoso!</h1>
    <p class="text-gray-600 mt-2">Tu transacción se ha procesado correctamente.</p>

    <!-- Logo de Mercado Pago en grande -->
    <div class="mt-6 flex flex-col items-center bg-blue-50 py-4 px-6 rounded-lg shadow-inner">
      <img src="assets/mercadopago-logo.svg" alt="Mercado Pago" class="h-12 mb-2">
      <span class="text-blue-700 font-semibold text-lg">Pago con Mercado Pago</span>
    </div>

    <!-- Detalles del pago -->
    <div class="mt-4 p-4 bg-gray-50 rounded-lg text-left shadow-sm border border-gray-200">
      <p><span class="font-semibold text-gray-700">ID de Transacción: </span> {{ transaction_id }}</p>
      <p><span class="font-semibold text-gray-700">Monto: </span>
        <span class="text-lg font-bold text-gray-900">{{ amount | currency:'COP ' }}</span>
      </p>
    </div>

    <!-- Botón para regresar al panel -->
    <button (click)="goToDashboard()" class="mt-6 bg-[#8DD7F7] hover:bg-[#76C5E3] text-black font-bold py-2 px-6 rounded-lg transition shadow-md">
      Inicio
    </button>
  </div>
</div>
